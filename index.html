<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #111827;
            --container-bg: #1f2937;
            --header-bg: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
            --chat-bg: radial-gradient(circle at center, #1f2937 0%, #111827 100%);
            --sent-bg: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            --btn-color: #ef4444;
            --btn-hover: #dc2626;
        }

        .theme-ocean {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --header-bg: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            --chat-bg: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            --sent-bg: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --btn-color: #3b82f6;
            --btn-hover: #2563eb;
        }

        .theme-forest {
            --bg-color: #064e3b;
            --container-bg: #065f46;
            --header-bg: linear-gradient(135deg, #064e3b 0%, #022c22 100%);
            --chat-bg: radial-gradient(circle at center, #065f46 0%, #022c22 100%);
            --sent-bg: linear-gradient(135deg, #10b981 0%, #047857 100%);
            --btn-color: #10b981;
            --btn-hover: #059669;
        }

        body {
            font-family: 'Tiro Bangla', serif;
            background-color: var(--bg-color); 
            margin: 0;
            padding: 0;
            height: 100vh; /* Fallback */
            height: 100dvh; /* Mobile browser fix */
            display: flex;
            justify-content: center;
            transition: background-color 0.5s;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--container-bg);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            transition: background-color 0.5s;
        }

        /* Improved Header for Mobile */
        .chat-header {
            background: var(--header-bg);
            padding: 1rem 1rem 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .header-top, .header-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .controls-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .theme-select, .mute-btn {
            background: rgba(0,0,0,0.3);
            color: #e5e7eb;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            font-size: 0.8rem;
            padding: 4px 8px;
            outline: none;
            cursor: pointer;
        }

        .mute-btn {
            font-size: 1rem;
            padding: 2px 8px;
        }

        .vanish-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--btn-color);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .vanish-btn:hover, .vanish-btn:active {
            background: var(--btn-color);
            color: white;
            box-shadow: 0 0 15px var(--btn-color);
        }

        .chat-box {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            background-image: var(--chat-bg);
        }

        .chat-box::-webkit-scrollbar { display: none; }

        .msg-bubble {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            font-size: 1.1rem;
            line-height: 1.4;
            animation: popIn 0.3s ease-out forwards;
            word-wrap: break-word;
            position: relative;
            margin-top: 5px;
            display: flex;
            flex-direction: column;
        }

        .msg-bubble .sender-name {
            font-size: 0.75rem;
            position: absolute;
            top: -18px;
            opacity: 0.8;
            font-family: sans-serif;
            white-space: nowrap;
        }

        .msg-status {
            font-size: 0.75rem;
            text-align: right;
            margin-top: 4px;
            font-weight: bold;
        }

        .seen-tick { color: #93c5fd; } /* Light blue color for seen */
        .sent-tick { color: #e5e7eb; opacity: 0.7; }

        .msg-sent {
            align-self: flex-end;
            background: var(--sent-bg);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .msg-sent .sender-name { right: 5px; color: #fca5a5; }

        .msg-received {
            align-self: flex-start;
            background: #374151;
            color: #f3f4f6;
            border-bottom-left-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .msg-received .sender-name { left: 5px; color: #9ca3af; }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .vanish-effect {
            animation: smokeOut 0.8s forwards !important;
        }

        @keyframes smokeOut {
            0% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
            50% { opacity: 0.5; transform: scale(1.1) translateY(-20px); filter: blur(5px); }
            100% { opacity: 0; transform: scale(1.5) translateY(-50px); filter: blur(10px); }
        }

        .chat-input-area {
            padding: 1rem;
            background-color: var(--container-bg);
            border-top: 1px solid #374151;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            padding-bottom: max(1rem, env(safe-area-inset-bottom)); /* Adjust for mobile notch */
        }

        .chat-input {
            flex: 1;
            background-color: #374151;
            color: white;
            border: 1px solid #4b5563;
            padding: 0.8rem 1rem;
            border-radius: 9999px;
            outline: none;
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }

        .chat-input:focus { border-color: var(--btn-color); }

        .send-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover, .send-btn:active {
            transform: scale(1.1);
            background-color: var(--btn-hover);
        }

        .send-icon { width: 20px; height: 20px; fill: currentColor; margin-left: 3px; }
    </style>
</head>
<body>

    <div class="chat-container" id="appContainer">
        <!-- Improved Mobile Header -->
        <div class="chat-header">
            <div class="header-top">
                <h2 class="text-xl font-bold">Secret Room 🔒</h2>
                <button class="vanish-btn" onclick="vanishMessages()">Vanish 💣</button>
            </div>
            <div class="header-bottom">
                <p class="text-xs text-gray-300" id="userNameDisplay">Connecting...</p>
                <div class="controls-row">
                    <select id="themeSelect" onchange="changeTheme()" class="theme-select">
                        <option value="default">Red</option>
                        <option value="ocean">Blue</option>
                        <option value="forest">Green</option>
                    </select>
                    <button id="muteBtn" class="mute-btn" onclick="toggleMute()" title="Toggle Sound">🔊</button>
                </div>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-box" id="chatBox"></div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="messageInput" class="chat-input" placeholder="মেসেজ লিখুন..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">
                <svg class="send-icon" viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // তোমার দেওয়া আসল ফায়ারবেস কনফিগারেশন 
        const firebaseConfig = {
            apiKey: "AIzaSyB3JW8tye9jzAhHV_Oe8aFs-YVwZczKzAk",
            authDomain: "secret-room-c6c93.firebaseapp.com",
            projectId: "secret-room-c6c93",
            storageBucket: "secret-room-c6c93.firebasestorage.app",
            messagingSenderId: "439480262807",
            appId: "1:439480262807:web:fa9be8cd7f39c4326ac9d2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesRef = collection(db, "secret_messages");

        // নতুন এবং মিষ্টি নোটিফিকেশন সাউন্ড
        const msgSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        let isMuted = false;

        window.toggleMute = function() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').innerText = isMuted ? '🔇' : '🔊';
        }

        // থিম চেঞ্জ করার ফাংশন
        window.changeTheme = function() {
            const theme = document.getElementById('themeSelect').value;
            const container = document.getElementById('appContainer');
            container.className = 'chat-container'; 
            if (theme !== 'default') container.classList.add(`theme-${theme}`);
            localStorage.setItem("chatTheme", theme);
        }

        const savedTheme = localStorage.getItem("chatTheme");
        if (savedTheme) {
            document.getElementById('themeSelect').value = savedTheme;
            changeTheme();
        }

        // ইউজারের নাম সেট করা
        let myName = localStorage.getItem("chatName");
        if (!myName) {
            myName = prompt("আপনার নাম লিখুন:");
            if(myName) localStorage.setItem("chatName", myName);
            else myName = "Anonymous";
        }
        document.getElementById('userNameDisplay').innerText = `Logged in as: ${myName}`;

        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        let initialLoad = true;
        let lastMessageCount = 0;

        // লাইভ মেসেজ লিসেনার
        onSnapshot(messagesRef, (snapshot) => {
            let msgs = [];
            snapshot.forEach((document) => {
                msgs.push({ id: document.id, ...document.data() });
            });
            
            msgs.sort((a, b) => a.timestamp - b.timestamp);
            chatBox.innerHTML = ''; 

            msgs.forEach((data) => {
                const isSentByMe = data.sender === myName;
                
                // শুধুমাত্র মেসেজ রিসিভকারী মেসেজটিকে "সিন (Seen)" করবে
                if (!isSentByMe && data.status !== 'seen') {
                    updateDoc(doc(db, "secret_messages", data.id), { status: 'seen' }).catch(e => console.log(e));
                }

                displayMessage(data.text, isSentByMe, data.sender, data.status);
            });

            // শুধুমাত্র মেসেজ রিসিভ করলেই সাউন্ড প্লে হবে (নিজের মেসেজ পাঠালে হবে না)
            if (!initialLoad && msgs.length > lastMessageCount) {
                const lastMsg = msgs[msgs.length - 1];
                if (lastMsg.sender !== myName && !isMuted) {
                    msgSound.play().catch(e => console.log("Audio play blocked"));
                }
            }

            lastMessageCount = msgs.length;
            initialLoad = false;
            scrollToBottom();
        }, (error) => {
            console.error("Error fetching messages: ", error);
        });

        function displayMessage(text, isSentByMe, senderName, status) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isSentByMe ? 'msg-bubble msg-sent' : 'msg-bubble msg-received';
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'sender-name';
            nameSpan.innerText = senderName;
            msgDiv.appendChild(nameSpan);

            const textSpan = document.createElement('span');
            textSpan.innerText = text;
            msgDiv.appendChild(textSpan);

            // শুধু নিজের পাঠানো মেসেজের নিচে Seen/Sent টিক মার্ক দেখাবে
            if (isSentByMe) {
                const statusDiv = document.createElement('div');
                statusDiv.className = 'msg-status';
                if (status === 'seen') {
                    statusDiv.innerHTML = '<span class="seen-tick">✓✓</span>';
                } else {
                    statusDiv.innerHTML = '<span class="sent-tick">✓</span>';
                }
                msgDiv.appendChild(statusDiv);
            }
            
            chatBox.appendChild(msgDiv);
        }

        // মেসেজ পাঠানোর ফাংশন
        window.sendMessage = async function() {
            const text = messageInput.value.trim();
            if (text === "") return;
            
            messageInput.value = ""; 

            // মেসেজ পাঠানোর সময় কোনো সাউন্ড হবে না
            
            try {
                await addDoc(messagesRef, {
                    text: text,
                    sender: myName,
                    timestamp: Date.now(),
                    status: 'sent' // ডিফল্ট স্ট্যাটাস Sent (✓)
                });
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("মেসেজ পাঠাতে সমস্যা হচ্ছে। ইন্টারনেট চেক করুন।");
            }
        }

        window.handleKeyPress = function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // সব মেসেজ ডিলিট (Vanish) করার ফাংশন
        window.vanishMessages = async function() {
            const confirmVanish = confirm("সব মেসেজ দুই জনের ফোন থেকেই চিরতরে ডিলিট হয়ে যাবে! নিশ্চিত?");
            if(!confirmVanish) return;

            const messages = document.querySelectorAll('.msg-bubble');
            messages.forEach((msg, index) => {
                msg.style.animationDelay = `${index * 0.05}s`;
                msg.classList.add('vanish-effect');
            });

            try {
                const querySnapshot = await getDocs(messagesRef);
                querySnapshot.forEach((docSnap) => {
                    deleteDoc(docSnap.ref);
                });
            } catch(e) {
                console.error("Error deleting: ", e);
            }

            setTimeout(() => {
                window.history.replaceState(null, '', 'https://www.google.com');
                window.close();
                window.location.replace('https://www.google.com');
            }, 1000);
        }
    </script>
</body>
</html>
