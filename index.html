<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tiro Bangla', serif;
            background-color: #111827; 
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #1f2937;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .chat-header {
            background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .vanish-btn {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 0.4rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .vanish-btn:hover, .vanish-btn:active {
            background: #ef4444;
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
        }

        .chat-box {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            background-image: radial-gradient(circle at center, #1f2937 0%, #111827 100%);
        }

        .chat-box::-webkit-scrollbar { display: none; }

        .msg-bubble {
            max-width: 75%;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            font-size: 1.1rem;
            line-height: 1.4;
            animation: popIn 0.3s ease-out forwards;
            word-wrap: break-word;
            position: relative;
            margin-top: 5px;
        }

        .msg-bubble .sender-name {
            font-size: 0.75rem;
            position: absolute;
            top: -18px;
            opacity: 0.8;
            font-family: sans-serif;
            white-space: nowrap;
        }

        .msg-sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2);
        }
        .msg-sent .sender-name { right: 5px; color: #fca5a5; }

        .msg-received {
            align-self: flex-start;
            background: #374151;
            color: #f3f4f6;
            border-bottom-left-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .msg-received .sender-name { left: 5px; color: #9ca3af; }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .vanish-effect {
            animation: smokeOut 0.8s forwards !important;
        }

        @keyframes smokeOut {
            0% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
            50% { opacity: 0.5; transform: scale(1.1) translateY(-20px); filter: blur(5px); }
            100% { opacity: 0; transform: scale(1.5) translateY(-50px); filter: blur(10px); }
        }

        .chat-input-area {
            padding: 1rem;
            background-color: #1f2937;
            border-top: 1px solid #374151;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background-color: #374151;
            color: white;
            border: 1px solid #4b5563;
            padding: 0.8rem 1rem;
            border-radius: 9999px;
            outline: none;
            font-size: 1.1rem;
            transition: border-color 0.3s;
        }

        .chat-input:focus { border-color: #ef4444; }

        .send-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
            transition: all 0.2s;
        }

        .send-btn:hover, .send-btn:active {
            transform: scale(1.1);
            background-color: #dc2626;
        }

        .send-icon { width: 20px; height: 20px; fill: currentColor; margin-left: 3px; }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div>
                <h2 class="text-xl font-bold">Secret Room 🔒</h2>
                <p class="text-xs text-red-200" id="userNameDisplay">Connecting...</p>
            </div>
            <button class="vanish-btn" onclick="vanishMessages()">Vanish 💣</button>
        </div>

        <!-- Chat Messages -->
        <div class="chat-box" id="chatBox"></div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="messageInput" class="chat-input" placeholder="মেসেজ লিখুন..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">
                <svg class="send-icon" viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Firebase SDKs (GitHub Pages এ কাজ করার জন্য) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // তোমার দেওয়া আসল ফায়ারবেস কনফিগারেশন 
        const firebaseConfig = {
            apiKey: "AIzaSyB3JW8tye9jzAhHV_Oe8aFs-YVwZczKzAk",
            authDomain: "secret-room-c6c93.firebaseapp.com",
            projectId: "secret-room-c6c93",
            storageBucket: "secret-room-c6c93.firebasestorage.app",
            messagingSenderId: "439480262807",
            appId: "1:439480262807:web:fa9be8cd7f39c4326ac9d2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesRef = collection(db, "secret_messages");

        // ইউজারের নাম সেট করা
        let myName = localStorage.getItem("chatName");
        if (!myName) {
            myName = prompt("আপনার নাম লিখুন (যেমন: Mehedi / Tisha):");
            if(myName) localStorage.setItem("chatName", myName);
            else myName = "Anonymous";
        }
        document.getElementById('userNameDisplay').innerText = `Logged in as: ${myName}`;

        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');

        // লাইভ মেসেজ লিসেনার (রিয়েল-টাইম)
        onSnapshot(messagesRef, (snapshot) => {
            let msgs = [];
            snapshot.forEach((doc) => {
                msgs.push({ id: doc.id, ...doc.data() });
            });
            
            // মেসেজগুলো সময়ের ক্রমানুসারে সাজানো
            msgs.sort((a, b) => a.timestamp - b.timestamp);

            chatBox.innerHTML = ''; 
            msgs.forEach((data) => {
                displayMessage(data.text, data.sender === myName, data.sender);
            });
            scrollToBottom();
        }, (error) => {
            console.error("Error fetching messages: ", error);
        });

        function displayMessage(text, isSentByMe, senderName) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isSentByMe ? 'msg-bubble msg-sent' : 'msg-bubble msg-received';
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'sender-name';
            nameSpan.innerText = senderName;
            
            msgDiv.innerText = text;
            msgDiv.appendChild(nameSpan);
            
            chatBox.appendChild(msgDiv);
        }

        // মেসেজ পাঠানোর ফাংশন
        window.sendMessage = async function() {
            const text = messageInput.value.trim();
            if (text === "") return;
            
            messageInput.value = ""; 

            try {
                await addDoc(messagesRef, {
                    text: text,
                    sender: myName,
                    timestamp: Date.now() // বর্তমান সময়
                });
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("মেসেজ পাঠাতে সমস্যা হচ্ছে। ইন্টারনেট চেক করুন।");
            }
        }

        window.handleKeyPress = function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // সব মেসেজ ডিলিট (Vanish) করার ফাংশন
        window.vanishMessages = async function() {
            const confirmVanish = confirm("সব মেসেজ দুই জনের ফোন থেকেই চিরতরে ডিলিট হয়ে যাবে! নিশ্চিত?");
            if(!confirmVanish) return;

            // ভ্যানিশ অ্যানিমেশন
            const messages = document.querySelectorAll('.msg-bubble');
            messages.forEach((msg, index) => {
                msg.style.animationDelay = `${index * 0.05}s`;
                msg.classList.add('vanish-effect');
            });

            // ডাটাবেস থেকে ডিলিট করা
            try {
                const querySnapshot = await getDocs(messagesRef);
                querySnapshot.forEach((docSnap) => {
                    deleteDoc(docSnap.ref);
                });
            } catch(e) {
                console.error("Error deleting: ", e);
            }
        }
    </script>
</body>
</html>
